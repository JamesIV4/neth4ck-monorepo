name: CI

on:
    push:
        branches: [master]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
    # Lint PR titles with commitlint
    lint-pr:
        name: Lint PR Title
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  HUSKY: "0"

            - name: Lint PR title
              run: echo "${{ github.event.pull_request.title }}" | pnpm exec commitlint

    build-and-test:
        name: Build, Lint & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: true

            - uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "pnpm"

            - name: Install build tools
              run: sudo apt-get update && sudo apt-get install -y bison flex

            - name: Cache Emscripten SDK
              id: emsdk-cache
              uses: actions/cache@v4
              with:
                  path: emsdk
                  key: emsdk-3.1.73-${{ runner.os }}

            - name: Install Emscripten SDK
              if: steps.emsdk-cache.outputs.cache-hit != 'true'
              run: |
                  git clone https://github.com/emscripten-core/emsdk.git
                  cd emsdk
                  ./emsdk install 3.1.73
                  ./emsdk activate 3.1.73

            - name: Activate Emscripten SDK
              run: |
                  cd emsdk
                  ./emsdk activate 3.1.73
                  source ./emsdk_env.sh
                  echo "$EMSDK" >> $GITHUB_PATH
                  echo "$EMSDK/upstream/emscripten" >> $GITHUB_PATH
                  echo "$EMSDK/node/$(ls $EMSDK/node)/bin" >> $GITHUB_PATH

            - name: Verify Emscripten
              run: emcc --version

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  HUSKY: "0"

            - name: Cache Nx
              uses: actions/cache@v4
              with:
                  path: .nx/cache
                  key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      nx-${{ runner.os }}-

            - name: Check formatting
              run: pnpm format:check

            - name: Lint
              run: pnpm lint

            - name: Build WASM
              run: pnpm build

            - name: Test
              run: pnpm test

            - name: Upload wasm-367 build
              uses: actions/upload-artifact@v4
              with:
                  name: build-wasm-367
                  path: packages/wasm-367/build/
                  retention-days: 1

            - name: Upload wasm-37 build
              uses: actions/upload-artifact@v4
              with:
                  name: build-wasm-37
                  path: packages/wasm-37/build/
                  retention-days: 1

    release:
        name: Release
        needs: build-and-test
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: pnpm/action-setup@v4

            # Note: Do NOT set registry-url - it interferes with OIDC trusted publishing
            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "pnpm"

            # Upgrade npm to 11.5.1+ for OIDC trusted publishing support
            - name: Upgrade npm for trusted publishing
              run: |
                  npm install -g npm@latest
                  npm --version

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              env:
                  HUSKY: "0"

            - name: Download wasm-367 build
              uses: actions/download-artifact@v4
              with:
                  name: build-wasm-367
                  path: packages/wasm-367/build/

            - name: Download wasm-37 build
              uses: actions/download-artifact@v4
              with:
                  name: build-wasm-37
                  path: packages/wasm-37/build/

            - name: Configure Git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Cache Nx
              uses: actions/cache@v4
              with:
                  path: .nx/cache
                  key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
                  restore-keys: |
                      nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
                      nx-${{ runner.os }}-

            - name: Version and Release
              run: |
                  echo "npm version: $(npm --version)"
                  echo "node version: $(node --version)"
                  pnpm exec nx release --yes --verbose
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: true
                  NODE_AUTH_TOKEN: ""
                  HUSKY: "0"
